<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak - Premium Digital Greeting</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div id="loader">
        <div class="ketupat-loader"></div>
        <p>Menyiapkan kejutan Idul Fitri...</p>
    </div>

    <div class="stars" id="stars-container"></div>
    <div class="moon"></div> <div class="floating-ketupat left"></div>
    <div class="floating-ketupat right"></div>
    <div class="praying-hands"></div>

    <button id="audio-btn" class="glow-hover">🔈 Putar Musik</button>
    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div id="name-modal" class="modal active">
        <div class="modal-content glass">
            <h2>Masukan namamu?</h2>
            <input type="text" id="user-name-input" placeholder="Nama..." autocomplete="off">
            <button id="start-btn" class="btn primary-btn">Lanjut ✨</button>
        </div>
    </div>

    <main id="main-content" class="hidden">
        
        <section id="hero">
            <h3 class="fade-in" id="greeting-to">Untuk: [Nama Pengguna]</h3>
            <h1 class="slide-up">Selamat Hari Raya<br><span class="gold-text">Idul Fitri</span></h1>
            <p class="fade-in typing-text">1 Syawal 1447 H • Mohon Maaf Lahir dan Batin</p>
            
            <button id="surprise-btn" class="btn gold-btn glow-hover">Klik untuk Kejutan 🎁</button>
        </section>

        <section id="surprise-section" class="hidden">
            <div class="card glass">
                <h2 class="gold-text">Pesan Spesial Untukmu</h2>
                <p id="random-quote">"Momen fitrah, hati bersih, sambut kebahagiaan. Maaf lahir dan batin."</p>
                <div class="card-footer">
                    <p>Salam hangat,</p>
                    <p class="sender-name">Keluarga Besar El</p>
                </div>
            </div>
        </section>

    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
